name: Deploy VAST
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      # The magic line that ignores the dependency conflict:
      - run: npm install --legacy-peer-deps

      - name: Build with Secrets
        # We add the --emptyOutDir flag just to be safe
        run: npx vite build
        run: cp -r a dist/
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - uses: actions/deploy-pages@v4
